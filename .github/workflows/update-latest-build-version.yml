##############################################################################################
#
# This Workflow is responsible for updating the latest build version of the project.
# You can provide your own base branch, tag, or SHA for git operations and the pull request.
# and it will generate the latest build version & update the neccessary files for you.
#
# IMPORTANT: package.json is the single source of truth for version information.
# This workflow validates package.json first before updating other files.
#
##############################################################################################
name: Update Latest Build Version


on:
  workflow_dispatch:
    inputs:
      base-branch:
        description: 'The base branch, tag, or SHA for git operations and the pull request.'
        required: true
jobs:
    generate-build-version:
      uses: MetaMask/metamask-mobile-build-version/.github/workflows/metamask-mobile-build-version.yml@v0.2.0
      permissions:
        id-token: write

    bump-version:
        runs-on: ubuntu-latest
        needs: generate-build-version
        permissions:
          contents: write
          id-token: write
        steps:
        - uses: actions/checkout@v3
          with:
            fetch-depth: 0
            ref: ${{ inputs.base-branch }}
            token: ${{ secrets.PR_TOKEN }}

        - name: Validate package.json structure
          run: |
            echo "Validating package.json has required version fields..."
            if ! jq -e '.version' package.json > /dev/null 2>&1; then
              echo "ERROR: package.json is missing 'version' field"
              exit 1
            fi
            if ! jq -e '.build.versionCode' package.json > /dev/null 2>&1; then
              echo "WARNING: package.json is missing 'build.versionCode' field"
              echo "Adding build metadata fields to package.json..."
            fi
            echo "package.json validation passed"
            
        - name: Bump script
          env:
            HEAD_REF: ${{ inputs.base-branch }}
          run: |
            ./scripts/set-build-version.sh ${{ needs.generate-build-version.outputs.build-version }}
            git diff
            git config user.name metamaskbot
            git config user.email metamaskbot@users.noreply.github.com
            git add bitrise.yml
            git add package.json
            git add ios/MetaMask.xcodeproj/project.pbxproj
            git add android/app/build.gradle
            git commit -m "Bump version number to ${{ needs.generate-build-version.outputs.build-version }}"
            git push origin HEAD:"$HEAD_REF" --force

        - name: Verify version synchronization
          run: |
            echo "Verifying all version files are synchronized..."
            ./scripts/verify-versions.sh || echo "WARNING: Version verification found issues"
            
  